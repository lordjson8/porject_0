{% load i18n %}

<div class="chart-container" role="figure" aria-label="{{ title }}">
  <div class="chart-container__header">
    <div>
      <h3 class="chart-container__title">{{ title }}</h3>
      {% if subtitle %}
        <p class="chart-container__subtitle">{{ subtitle }}</p>
      {% endif %}
    </div>
  </div>

  <div class="chart-canvas-wrapper"
       style="display:flex;align-items:center;gap:var(--space-6);flex-wrap:wrap;">
    <canvas id="{{ chart_id }}"
            height="{{ height|default:240 }}"
            style="max-width:240px;max-height:{{ height|default:240 }}px"
            aria-label="{{ title }}"
            role="img">
      <p>{% trans "Votre navigateur ne supporte pas les graphiques." %}</p>
    </canvas>
    {# Legend injected by JS #}
    <div id="{{ chart_id }}-legend" style="flex:1;min-width:120px;"></div>
  </div>

  {% if chart_data %}
    <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        var ctx        = document.getElementById('{{ chart_id }}');
        var legendEl   = document.getElementById('{{ chart_id }}-legend');
        if (!ctx || typeof Chart === 'undefined') return;

        var data   = {{ chart_data }};
        var colors = [
          '#FF6C37', '#17A2B8', '#28A745', '#FFC107',
          '#DC3545', '#6F42C1', '#20C997', '#FD7E14',
          '#6610F2', '#E83E8C'
        ];

        var chart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.labels,
            datasets: [{
              data: data.values,
              backgroundColor: colors.slice(0, data.values.length),
              borderWidth: 3,
              borderColor: '#fff',
              hoverBorderColor: '#fff'
            }]
          },
          options: {
            responsive: false,
            cutout: '68%',
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1A1A2E',
                padding: 10,
                cornerRadius: 8,
                callbacks: {
                  label: function(ctx) {
                    var total  = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                    var pct    = Math.round((ctx.parsed / total) * 100);
                    return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                  }
                }
              }
            }
          }
        });

        // Custom legend
        if (legendEl && data.labels) {
          var html = '<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px">';
          data.labels.forEach(function(label, i) {
            var total = data.values.reduce(function(a, b) { return a + b; }, 0);
            var pct   = total > 0 ? Math.round((data.values[i] / total) * 100) : 0;
            html += '<li style="display:flex;align-items:center;gap:8px;font-size:13px">'
              + '<span style="width:12px;height:12px;border-radius:3px;background:' + (colors[i] || '#ccc') + ';flex-shrink:0"></span>'
              + '<span style="flex:1">' + label + '</span>'
              + '<span style="font-weight:600">' + pct + '%</span>'
              + '</li>';
          });
          html += '</ul>';
          legendEl.innerHTML = html;
        }
      });
    }());
    </script>
  {% endif %}
</div>
