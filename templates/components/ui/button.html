{% load i18n %}

{% if href %}
<a class="btn btn--{{ variant|default:'primary' }}{% if size %} btn--{{ size }}{% endif %}{% if full %} btn--full{% endif %}{% if disabled %} is-disabled{% endif %}{% if loading %} is-loading{% endif %}"
   href="{% if disabled %}#{% else %}{{ href }}{% endif %}"
   {% if disabled %}aria-disabled="true"{% endif %}
   {% if attrs %}{{ attrs }}{% endif %}>
  {% if icon and not icon_right %}<i class="fa-solid {{ icon }}" aria-hidden="true"></i>{% endif %}
  {% if label %}<span>{{ label }}</span>{% endif %}
  {% if icon and icon_right %}<i class="fa-solid {{ icon }}" aria-hidden="true"></i>{% endif %}
</a>
{% else %}
<button type="{{ type|default:'button' }}"
        class="btn btn--{{ variant|default:'primary' }}{% if size %} btn--{{ size }}{% endif %}{% if full %} btn--full{% endif %}{% if disabled %} is-disabled{% endif %}{% if loading %} is-loading{% endif %}"
        {% if disabled %}disabled aria-disabled="true"{% endif %}
        {% if attrs %}{{ attrs }}{% endif %}>
  {% if icon and not icon_right %}<i class="fa-solid {{ icon }}" aria-hidden="true"></i>{% endif %}
  {% if label %}<span>{{ label }}</span>{% endif %}
  {% if icon and icon_right %}<i class="fa-solid {{ icon }}" aria-hidden="true"></i>{% endif %}
</button>
{% endif %}
