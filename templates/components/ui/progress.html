{% load i18n %}

<div class="progress{% if size %} progress--{{ size }}{% endif %}"
     role="progressbar"
     aria-valuenow="{{ value|default:0 }}"
     aria-valuemin="0"
     aria-valuemax="100"
     aria-label="{{ label|default:value }}%">
  <div class="progress__bar{% if variant %} progress__bar--{{ variant }}{% endif %}"
       style="width: {{ value|default:0 }}%">
  </div>
</div>
{% if show_label %}
  <span class="text-xs text-muted" style="margin-top:4px;display:block;">
    {{ label|default:value }}%
  </span>
{% endif %}
